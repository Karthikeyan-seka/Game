<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>level1</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="game-screen">
    <img src="../../assets/room1/room final 2@1.5x@1.5x.png" class="bg-image" id = "bgImage"/>

    <img src="../../assets/room1/carpet in room 1.png" class="carpet" id="carpet"/>

    <img src="../../assets/room1/key to open the door for room 1.png" class="key hidden" id="key"/>

    <div class="carpet-area" id="carpetArea"></div>

    <div class="key-area disabled" id="keyArea"></div>
    <div id="doorArea" class="door-area disabled"></div>
    <img src="../../assets/ICONS/CLOSE@3x.png" id="finalCloseBtn" class="final-close-btn hidden" alt="Close"/>

    <img src="../../assets/room1/final panel 1.png" class="overlay-image hidden" id="overlay"/>

    <div class="ad-container hidden" id="adContainer">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-3212604162895578"
             data-ad-slot="1620433269"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>

    <div class="lastoptions" id="lastoptions" style="display: none;">
        <img src="../../assets/ICONS/HOME@3x.png" alt="" class="homebtn" id="lastButtons">
        <img src="../../assets/ICONS/PLAY@3x.png" alt=""class="nextbtn" id="lastButtons">
    </div>

    <div class="inventory">
        <img src="../../assets/room1/game inventry@3x.png" class="inventory-bg" />

        <div class="slot" id="slot1"></div>
    </div>

    <script src="script.js"></script>
</div>
</body>
</html>
