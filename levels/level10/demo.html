<!DOCTYPE html>
<html lang="en" style="background: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000" />
    <title>room10</title>
    <style>
        /* Prevent white flash - load before CSS */
        html, body {
            background: #000 !important;
            margin: 0;
            padding: 0;
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room10/2.webp">
    <link rel="preload" as="image" href="../../assets/room10/3.webp">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
    <div class="container">
        <img src="../../assets/room10/1.webp" alt="" class="bg1">
        <img src="../../assets/ICONS/game_inventry.webp" alt="" class="inventry"> 
        <img src="../../assets/ICONS/close.webp" alt="" class="closebtn">
        <div class="hitbox"></div>
        <div class="zoomoverlay">
            <img src="../../assets/room10/puzzles/clue.webp" alt="" class="clue"  id="small-clue">
            
            <div class="box-container">
                <img src="../../assets/room10/puzzles/Foxzoid-2.webp" alt="" class="clue">
                <div class="color-grid">
                    <div class="slot" id="slot1"></div><div class="slot" id="slot2"></div><div class="slot" id="slot3"></div>
                    <div class="slot" id="slot4"></div><div class="slot" id="slot5"></div><div class="slot" id="slot6"></div>
                    <div class="slot" id="slot7"></div><div class="slot" id="slot8"></div><div class="slot" id="slot9"></div>
                </div>
            </div>
        </div>
        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/ICONS/home.webp" alt="" class="homebtn" id="buttons">
            <img src="../../assets/ICONS/play.webp" alt=""class="playbtn" id="buttons">
       </div> 
       <img src="../../assets/room10/finalpanel10@2x.webp" alt="" id="finalPanel" class="success-panel">
       <img src="../../assets/ICONS/close.webp" alt="" class="closebtn2">
       
       <!-- escape game -->
       <ins class="adsbygoogle panel-ad"
            style="display:none; position: absolute; width: 100%; left: 0%; bottom: 0%; z-index: 1003; height: 200px;"
            data-ad-client="ca-pub-3212604162895578"
            data-ad-slot="1523547496"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
       
    </div>
    <script src="../load/loaderUtils.js"></script>
    <script src="script.js"></script>
</body>
</html>
