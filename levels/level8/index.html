<!DOCTYPE html>
<html lang="en" style="background: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000" />
    <title>Room8</title>
    <style>
        /* Prevent white flash - load before CSS */
        html, body {
            background: #000 !important;
            margin: 0;
            padding: 0;
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room8/2BG.webp">
    <link rel="preload" as="image" href="../../assets/room8/letter.webp">
    <link rel="preload" as="image" href="../../assets/room8/keywithletter.webp">
    <link rel="preload" as="image" href="../../assets/room8/finalbg.webp">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
    <div class="container">
        <img src="../../assets/room8/1BG.webp" alt="" class="bg1">
        <img src="../../assets/room8/2BG.webp" alt="" class="bg2">
        <div class="hitbox1"></div>
        <img src="../../assets/ICONS/game_inventry.webp" alt="" class="inventry" id="inventry">
        <img src="../../assets/room8/scissor.webp" alt="" class="scissor" id="scissor"> 
        <div class="hitbox2"></div>
        
        <img src="../../assets/room8/letterbox.webp" alt="" class="letterbox">
        <img src="../../assets/ICONS/close.webp" alt="" class="closebtn">
        <img src="../../assets/room8/key.webp" alt="inventory key" class="inventory-key" id="inventoryKey" style="display: none;">

        <div class="door-hitbox" id="doorHitbox"></div>
        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/ICONS/home.webp" alt="" class="homebtn" id="buttons">
            <img src="../../assets/ICONS/play.webp" alt=""class="playbtn" id="buttons">
       </div> 
        <img src="../../assets/ICONS/close.webp" alt="" class="closebtn2" id="closebtn2">
        <img src="../../assets/room8/finalpanel8@2x.webp" class="final-panel" id="finalPanel" style="display: none;">
        
        <!-- escape game -->
        <ins class="adsbygoogle panel-ad"
             style="display:none; position: absolute; width: 100%; left: 0%; bottom: 0%; z-index: 1003; height: 200px;"
             data-ad-client="ca-pub-3212604162895578"
             data-ad-slot="1523547496"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        
    </div>
    <script src="../load/loaderUtils.js"></script>
    <script src="script.js"></script>
</body>
</html>
