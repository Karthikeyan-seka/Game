<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room8</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room8/2BG.jpg">
    <link rel="preload" as="image" href="../../assets/room8/letter.png">
    <link rel="preload" as="image" href="../../assets/room8/keywithletter.png">
    <link rel="preload" as="image" href="../../assets/room8/finalbg.jpg">
</head>
<body>
    <div class="container">
        <img src="../../assets/room8/1BG.jpg" alt="" class="bg1">
        <img src="../../assets/room8/2BG.jpg" alt="" class="bg2">
        <div class="hitbox1"></div>
        <img src="../../assets/room8/game_inventry@3x.png" alt="" class="inventry" id="inventry">
        <img src="../../assets/room8/scissor.png" alt="" class="scissor" id="scissor"> 
        <div class="hitbox2"></div>
        
        <img src="../../assets/room8/letterbox.png" alt="" class="letterbox">
        <img src="../../assets/room8/CLOSEBUTTON.png" alt="" class="closebtn">
        <img src="../../assets/room8/key.png" alt="inventory key" class="inventory-key" id="inventoryKey" style="display: none;">

        <div class="door-hitbox" id="doorHitbox"></div>
        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/room8/HOME@3x.png" alt="" class="homebtn" id="buttons">
            <img src="../../assets/room8/PLAY@3x.png" alt=""class="playbtn" id="buttons">
       </div> 
        <img src="../../assets/room8/CLOSEBUTTON.png" alt="" class="closebtn2" id="closebtn2">
        <img src="../../assets/room8/finalpanel8@2x.png" class="final-panel" id="finalPanel" style="display: none;">
    </div>
    <script src="script.js"></script>
</body>
</html>
