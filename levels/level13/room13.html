<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>level13</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
  <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
  <div id="loader" class="loader"></div>
  <div class="game-screen" id="gameScreen" style="opacity: 0;">
    
    <div class="scene" id="scene">
        <img id="sceneImage" src="../../assets/room13/bg1@3x.webp" />
        <div class="clue-area" id="clueArea"></div>
        <img src="../../assets/room13/clue_paper@3x.webp" class="overlay-image hidden" id="overlay">
        <img src="../../assets/ICONS/close.webp" id="closeBtn" class="close-btn hidden" alt="Close"/>
        <img src="../../assets/ICONS/close.webp" id="finalCloseBtn" class="final-close-btn hidden" alt="Close"/>

        <div class="box-area" id="boxArea"></div>
        <div class="lock-area disabled" id="lockArea"></div>
        <div  class="keypad-wrapper" id="keypadWrapper" style="display: none;">
            <div class="button-grid">
                <img src="../../assets/room13/digital lock croped/1@3x.webp" class="num-btn" data-val="1">
                <img src="../../assets/room13/digital lock croped/2@3x.webp" class="num-btn" data-val="2">
                <img src="../../assets/room13/digital lock croped/3@3x.webp" class="num-btn" data-val="3">
                <img src="../../assets/room13/digital lock croped/4@3x.webp" class="num-btn" data-val="4">
                <img src="../../assets/room13/digital lock croped/5@3x.webp" class="num-btn" data-val="5">
                <img src="../../assets/room13/digital lock croped/6@3x.webp" class="num-btn" data-val="6">
                <img src="../../assets/room13/digital lock croped/7@3x.webp" class="num-btn" data-val="7">
                <img src="../../assets/room13/digital lock croped/8@3x.webp" class="num-btn" data-val="8">
                <img src="../../assets/room13/digital lock croped/9@3x.webp" class="num-btn" data-val="9">
                <img src="../../assets/room13/digital lock croped/w@3x.webp" class="num-btn" data-val="w">
                <img src="../../assets/room13/digital lock croped/0@3x.webp" class="num-btn" data-val="0">
                <img src="../../assets/room13/digital lock croped/e@3x.webp" class="num-btn" data-val="e">
            </div>
        </div>
        <div class="key-area disabled" id="keyArea"></div>
        <div class="final-lock-area disabled" id="finalLockArea"></div>

        <div class="lastoptions" id="lastoptions" style="display: none;">
          <img src="../../assets/ICONS/home.webp" alt="" class="homebtn" id="lastButtons">
          <!-- <img src="../../assets/ICONS/setting.png" alt="" class="retrybtn" id="lastButtons"> -->
          <img src="../../assets/ICONS/play.webp" alt=""class="nextbtn" id="lastButtons">
     </div>
     
     <!-- escape game -->
     <ins class="adsbygoogle panel-ad"
          style="display:none; position: absolute; width: 100%; left: 0%; bottom: 0%; z-index: 1003; height: 200px;"
          data-ad-client="ca-pub-3212604162895578"
          data-ad-slot="1523547496"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
     
    </div>
    <div class="inventory">
        <img src="../../assets/ICONS/game_inventry.webp" class="inventory-bg" id="inventory" />

        <div class="slot" id="slot"></div>
        <div class="slot1" id="slot1"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
