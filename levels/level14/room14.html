<!DOCTYPE html>
<html lang="en" style="background: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000" />
    <title>level14</title>
    <style>
        /* Prevent white flash - load before CSS */
        html, body {
            background: #000 !important;
            margin: 0;
            padding: 0;
        }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
    <div id="loader" class="loader"></div>
    <div class="game-screen" id="gameScreen" style="opacity: 0;">
        <!-- Background -->
        <img src="../../assets/room14/bg_1@3x.webp" class="bg-image" id = "sceneImage"/>
        <div class="clue-area" id="clueArea"></div>
        <img src="../../assets/room14/letter_box_14@3x.webp" class="overlay-image hidden" id="overlay">
        <div class="letter-area disabled" id="letterArea"></div>
        <div class="letter-open-area disabled" id="letterOpenArea"></div>
        <div class="click-area" id="clickArea"></div>
        <div class="color-buttons-container" id="colorButtons" style="display: none;">
            <img src="../../assets/room14/red_button.webp" class="color-btn" id="redBtn">
            <img src="../../assets/room14/yellow.webp" class="color-btn" id="yellowBtn">
            <img src="../../assets/room14/white_button.webp" class="color-btn" id="whiteBtn">
        </div>
        <div class="key-area disabled" id="keyArea"></div>
        <div class="final-lock-area disabled" id="finalLockArea"></div>

        <img src="../../assets/ICONS/close.webp" id="closeBtn" class="close-btn hidden" alt="Close"/>
        <img src="../../assets/ICONS/close.webp" id="finalCloseBtn" class="final-close-btn hidden" alt="Close"/>
        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/ICONS/home.webp" alt="" class="homebtn" id="lastButtons">
            <!-- <img src="../../assets/ICONS/setting.png" alt="" class="retrybtn" id="lastButtons"> -->
            <img src="../../assets/ICONS/play.webp" alt=""class="nextbtn" id="lastButtons">
       </div> 

        <div class="inventory">
            <img src="../../assets/ICONS/game_inventry.webp" class="inventory-bg" />

            <div class="slot" id="slot"></div>
        </div>

        <!-- escape game -->
        <ins class="adsbygoogle panel-ad"
             style="display:none; position: absolute; width: 100%; left: 0%; bottom: 0%; z-index: 1003; height: 200px;"
             data-ad-client="ca-pub-3212604162895578"
             data-ad-slot="1523547496"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>

        <script src="../load/loaderUtils.js"></script>
        <script src="script.js"></script>
    </div>
</body>
</html>
