<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - Level 12</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loader" class="loader"></div>
<div class="game-screen" id="gameScreen" style="opacity: 0;">
    <img src="../../assets/room12/1bg.webp" class="bg-image" id="bgImage"/>

    <img src="../../assets/room12/lo.webp" class="door-knob hidden" id="doorKnobImg"/>

    <div class="door-knob-hitbox" id="doorKnobHitbox"></div>
1
    <div id="doorArea" class="door-drop-zone disabled"></div>

    <img src="../../assets/ICONS/close.png" id="closeButton" class="close-btn hidden" />

    <div class="inventory">
        <img src="../../assets/ICONS/game_inventry.png" class="inventory-bg" />
        <div class="slot" id="slot1"></div>
    </div>

    <div id="mazeOverlay" class="maze-overlay hidden">
        <div class="maze-container">
            <canvas id="mazeCanvas"></canvas>

            <div id="joystick-zone" class="controls">
                <div id="joystick-base">
                    <div id="joystick-stick"></div>
                </div>
            </div>
            <p class="instructions">Guide the Key out of the Maze!</p>
        </div>
    </div>

    <div id="levelCompletePanel" class="level-complete-container hidden">
        <img src="../../assets/room12/finalpanel12@2x.webp" class="panel-bg" />

        <img src="../../assets/ICONS/close.png" id="panelCloseBtn" class="panel-close-btn" />

        <div class="panel-buttons">
            <img src="../../assets/ICONS/home.png" id="homeBtn" class="panel-btn" />
            <img src="../../assets/ICONS/play.png" id="nextBtn" class="panel-btn" />
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
