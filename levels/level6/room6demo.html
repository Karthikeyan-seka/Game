<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name= "viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room6/lock.png">
    <link rel="preload" as="image" href="../../assets/room6/8@3x.png">
    <link rel="preload" as="image" href="../../assets/room6/lockopen.png">
    <link rel="preload" as="image" href="../../assets/room6/toy.png">
    
</head>
<body>
    <div id="loader" class="loader"></div>
    <div  class="container" id="gameScreen" style="opacity: 0;">
        <img src="../../assets/room6/bg1.png" alt="" class="bg1" id="mainbg">
        <img src="../../assets/room6/bg2.png" alt="" class="bg2" id="opendoor">
        <img src="../../assets/ICONS/game_inventry.png" alt="" class="inventry" id="inventry">
        <div class="hitbox1"></div>
        <img src="../../assets/room6/wallclue.png" alt="" class="clue1" id="clue1">
        <div class="hitbox2"></div>
        <img src="../../assets/room6/dollor.png" alt="" class="clue2" id="clue2">
        <div class="hitbox3"></div>
        <img src="../../assets/room6/colourpaperclue.png" alt="" class="clue3" id="clue3">
        <div class="hitbox4"></div>
        <img src="../../assets/room6/lock.png" alt="" class="clue4" id="clue4">

        <div  class="keypad-wrapper" id="keypadWrapper" style="display: none;">
            
            <div class="button-grid">
                <img src="../../assets/room6/digitallockcroped/1@3x.png" class="num-btn" data-val="1">
                <img src="../../assets/room6/digitallockcroped/2@3x.png" class="num-btn" data-val="2">
                <img src="../../assets/room6/digitallockcroped/3@3x.png" class="num-btn" data-val="3">
                <img src="../../assets/room6/digitallockcroped/4@3x.png" class="num-btn" data-val="4">
                <img src="../../assets/room6/digitallockcroped/5@3x.png" class="num-btn" data-val="5">
                <img src="../../assets/room6/digitallockcroped/6@3x.png" class="num-btn" data-val="6">
                <img src="../../assets/room6/digitallockcroped/7@3x.png" class="num-btn" data-val="7">
                <img src="../../assets/room6/digitallockcroped/8@3x.png" class="num-btn" data-val="8">
                <img src="../../assets/room6/digitallockcroped/9@3x.png" class="num-btn" data-val="9">
                <img src="../../assets/room6/digitallockcroped/w@3x.png" class="num-btn" data-val="w">
                <img src="../../assets/room6/digitallockcroped/0@3x.png" class="num-btn" data-val="0">
                <img src="../../assets/room6/digitallockcroped/e@3x.png" class="num-btn" data-val="e">
            </div>
        </div>


        <div class="hitbox5"></div>
        <div class="color-buttons-container" id="colorButtons" style="display: none;">
            <img src="../../assets/room6/redbutton.png" class="color-btn" id="redBtn">
            <img src="../../assets/room6/yellow.png" class="color-btn" id="yellowBtn">
            <img src="../../assets/room6/whitebutton.png" class="color-btn" id="whiteBtn">
        </div>
        <img src="../../assets/ICONS/close.png" alt="" class="closebtn" id="closebtn"> 

        <div class="lastoptions" id="lastoptions" style="display: none;">
             <img src="../../assets/ICONS/home.png" alt="" class="homebtn" id="buttons">
             <img src="../../assets/ICONS/play.png" alt=""class="playbtn" id="buttons">
        </div> 
        <img src="../../assets/ICONS/close.png" alt="" class="closebtn2" id="closebtn2">
        <img src="../../assets/room6/finalpanel6.png" id="finalPanel" class="success-panel">
    </div>
    <script src="script.js"></script>
    
</body>
</html>
