<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room3/gameplay2@3x@3x.png">
    <link rel="preload" as="image" href="../../assets/room3/gameplay3@3x@3x.png">
    <link rel="preload" as="image" href="../../assets/room3/gameplay1@3x.png">
    <link rel="preload" as="image" href="../../assets/room3/gameplaybgfinal@3x@3x.jpg"> 
</head>
<body>
    <div id="loader" class="loader"></div>
    <div class="container" id="gameScreen" style="opacity: 0;">
            
        <img src="../../assets/room3/1stbg@3x.jpg" alt="bg" class="bg-img">
        <div class="small-box"></div>   

        <img src="../../assets/ICONS/game_inventry.png" alt="" class="inventry">
        <img src="../../assets/room3/keytoopenthedoorforroom1.png" alt="" class="key"  id="key"  draggable="true">
        
        <div class="zoomoverlay">
            <img src="../../assets/ICONS/close.png" alt="" class="close-btn">
            <img src="../../assets/room3/gameplaybg@3x.jpg" alt="" class="blur-bg">
            <img src="../../assets/room3/gameplay1@3x.png" alt="" class="box1" id="box1">     
        </div>

        <div class="door-lockbox" id="doorlock"></div>

        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/ICONS/home.png" alt="" class="homebtn" id="buttons">
            <img src="../../assets/ICONS/play.png" alt="" class="retrybtn" id="buttons">
       </div> 
       
        <img src="../../assets/room3/finalpanel3.png"  id="finalPanel" class="success-panel">
        <img src="../../assets/ICONS/close.png" alt="" class="close-btn2">
        

    </div>
    <script src="script.js"></script>
</body>
</html>
