<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="../../assets/room3/gameplay2@3x@3x.webp">
    <link rel="preload" as="image" href="../../assets/room3/gameplay3@3x@3x.webp">
    <link rel="preload" as="image" href="../../assets/room3/gameplay1@3x.webp">
    <link rel="preload" as="image" href="../../assets/room3/gameplaybgfinal@3x@3x.webp"> 
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
    <div id="loader" class="loader"></div>
    
    <div class="game-wrapper">
        <div class="container" id="gameScreen" style="opacity: 0;">
            
        <img src="../../assets/room3/1stbg@3x.webp" alt="bg" class="bg-img">
        <div class="small-box"></div>   

        <img src="../../assets/ICONS/game_inventry.webp" alt="" class="inventry">
        <img src="../../assets/room3/keytoopenthedoorforroom1.png" alt="" class="key"  id="key"  draggable="true">
        
        <div class="zoomoverlay">
            <img src="../../assets/ICONS/close.webp" alt="" class="close-btn">
            <img src="../../assets/room3/gameplaybg@3x.webp" alt="" class="blur-bg">
            <img src="../../assets/room3/gameplay1@3x.webp" alt="" class="box1" id="box1">     
        </div>

        <div class="door-lockbox" id="doorlock"></div>

        <div class="lastoptions" id="lastoptions" style="display: none;">
            <img src="../../assets/ICONS/home.webp" alt="" class="homebtn" id="homeBtn">
            <img src="../../assets/ICONS/play.webp" alt="" class="retrybtn" id="retryBtn">
       </div> 
       
        <img src="../../assets/room3/finalpanel3.webp"  id="finalPanel" class="success-panel">
        <img src="../../assets/ICONS/close.webp" alt="" class="close-btn2">
        
        <!-- escape game -->
        <ins class="adsbygoogle panel-ad"
             style="display:none; position: absolute; width: 100%; left: 0%; bottom: 0%; z-index: 1003; height: 200px;"
             data-ad-client="ca-pub-3212604162895578"
             data-ad-slot="1523547496"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        

    </div>
    
    <script src="../../assets/js/seamlessMusic.js"></script>
    <script src="../../assets/js/gameEndMusicControl.js"></script>
    <script src="script.js"></script>
</body>
</html>
