<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Escape - Level 2</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loader" class="loader"></div>
<div class="game-screen" id="gameScreen" style="opacity: 0;">

    <img src="../../assets/room2/room%202%20background@3x@3x.jpg" class="bg-image" id="bgImage"/>

    <img src="../../assets/room2/button@3x.png" class="button hidden" id="floorButton"/>

    <img src="../../assets/room2/game%20play%201@3x.png" class="leaf" id="leaf"/>

    <img src="../../assets/ICONS/close.png" id="closeButton" class="close-btn hidden" />

    <div class="leaf-area" id="leafArea"></div>
    <div class="button-area" id="buttonArea"></div>
    <div id="doorArea" class="door-area disabled"></div>

    <div class="inventory">
        <img src="../../assets/ICONS/game_inventry.png" class="inventory-bg" />
        <div class="slot" id="slot1"></div>
    </div>

    <div id="levelCompletePanel" class="level-complete-container hidden">
        <img src="../../assets/room2/final%20panel%202.png" class="panel-bg" />

        <img src="../../assets/ICONS/close.png" id="panelCloseBtn" class="panel-close-btn" />

        <div class="ad-container">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3212604162895578" crossorigin="anonymous"></script>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3212604162895578"
                 data-ad-slot="1620433269"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="panel-buttons">
            <img src="../../assets/ICONS/home.png" id="homeBtn" class="panel-btn" />
            <img src="../../assets/ICONS/play.png" id="nextBtn" class="panel-btn" />
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
