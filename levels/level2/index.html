<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Escape - Level 2</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="game-screen">

    <img src="../../assets/room2/room%202%20background@3x@3x.jpg" class="bg-image" id="bgImage"/>

    <img src="../../assets/room2/button@3x.png" class="button hidden" id="floorButton"/>

    <img src="../../assets/room2/game%20play%201@3x.png" class="leaf" id="leaf"/>

    <img src="../../assets/ICONS/CLOSE@3x.png" id="closeButton" class="close-btn hidden" />

    <div class="leaf-area" id="leafArea"></div>
    <div class="button-area" id="buttonArea"></div>
    <div id="doorArea" class="door-area disabled"></div>

    <div class="inventory">
        <img src="../../assets/ICONS/game%20inventry@3x.png" class="inventory-bg" />
        <div class="slot" id="slot1"></div>
    </div>

    <img src="../../assets/ICONS/CLOSE@3x.png" id="finalCloseBtn" class="final-close-btn hidden" alt="Close"/>

    <img src="../../assets/room2/final%20panel%202.png" class="overlay-image hidden" id="overlay"/>
    <div class="lastoptions" id="lastoptions" style="display: none;">
        <img src="../../assets/ICONS/HOME@3x.png" alt="" class="homebtn" id="lastButtons">
        <img src="../../assets/ICONS/PLAY@3x.png" alt=""class="nextbtn" id="lastButtons">
   </div>

</div>

<script src="script.js"></script>
</body>
</html>
