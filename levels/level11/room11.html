<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Handle Interaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loader" class="loader"></div>
<!-- Game Screen Container -->
<div class="game-screen" id="gameScreen" style="opacity: 0;">
    <!-- Door Image -->
    <img src="../../assets/room11/bg 1.png" class="bg-image" id="bgImage" alt="Door">
    
    <!-- Inventory -->
    <img src="../../assets/room11/game inventry@3x.png" class="inventory-bg" alt="Game Inventory">
    <div class="slot" id="slot11">
        <img src="../../assets/room11/keys.png" class="inventory-key hidden" id="inventoryKey" alt="Key" draggable="true">
    </div>
    
    <!-- Handle Hotspot -->
    <div class="handle-area" id="handle" role="button" aria-label="Click door handle"></div>
    
    <!-- Level Complete Panel -->
    <img src="../../assets/room11/final panel 11@2x.png" class="overlay-image hidden" id="finalPanel11" />
    <img src="../../assets/ICONS/CLOSE@3x.png" id="panelCloseBtn11" class="final-close-btn hidden" />
    <div id="lastoptions11" class="lastoptions" style="display: none;">
        <img src="../../assets/ICONS/HOME@3x.png" id="homeBtn11" class="lastButtons" />
        <img src="../../assets/ICONS/PLAY@3x.png" id="nextBtn11" class="lastButtons" />
    </div>
    
    <!-- First Popup - Zoom View -->
    <div class="popup" id="popup" role="dialog" aria-hidden="true">
        <div class="zoom-container">
            <img src="../../assets/room11/zoom.png" id="popup-img" alt="Door handle close-up" role="button">
        </div>
    </div>
    
    <!-- Second Popup - Puzzle Game -->
    <div class="popup" id="popup2" role="dialog" aria-hidden="true">
        <div class="bg-container">
            <img src="../../assets/room11/puzzle and key/1.png" alt="Puzzle background" class="bg-image">
            
            <!-- Key Images (dynamically shown/hidden) -->
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key0">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key1">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key2">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key3">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key4">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key5">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key6">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key7">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key8">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key9">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key10">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key11">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key12">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key13">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key14">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key15">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key16">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key17">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key18">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key19">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key20">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key21">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key22">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key23">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key24">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key25">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key26">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key27">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key28">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key29">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key30">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key31">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key32">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key33">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key34">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key35">
            <img src="../../assets/room11/puzzle and key/key.png" alt="Key" class="key-image" id="key36">
            
            <!-- Arrow Controls -->
            <div class="arrow-box">
                <div class="arrow-row">
                    <button class="arrow-btn" data-dir="up" aria-label="Move up">
                        <img src="../../assets/room11/arrows/arrow (1).png" alt="" class="arrow">
                    </button>
                    <button class="arrow-btn" data-dir="down" aria-label="Move down">
                        <img src="../../assets/room11/arrows/arrow (4).png" alt="" class="arrow">
                    </button>
                    <button class="arrow-btn" data-dir="left" aria-label="Move left">
                        <img src="../../assets/room11/arrows/arrow (5).png" alt="" class="arrow">
                    </button>
                    <button class="arrow-btn" data-dir="right" aria-label="Move right">
                        <img src="../../assets/room11/arrows/arrow (6).png" alt="" class="arrow">
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
